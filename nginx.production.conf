# Nginx Configuração Produção - SAACB
# Domínio: saacb.lakeserver.online

# ==========================================
# HTTP → HTTPS REDIRECT
# ==========================================
server {
    listen 80;
    server_name saacb.lakeserver.online;

    # Redirecionar todo HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

# ==========================================
# HTTPS - DROGÃO
# ==========================================
server {
    listen 443 ssl http2;
    server_name saacb.lakeserver.online;

    # SSL Certificados (Let's Encrypt ou certificado próprio)
    ssl_certificate /etc/nginx/ssl/saacb.lakeserver.online.crt;
    ssl_certificate_key /etc/nginx/ssl/saacb.lakeserver.online.key;

    # SSL Configurações
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (Opcional - desative se ainda estiver testando)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Headers de Segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logs
    access_log /var/log/nginx/saacb-access.log;
    error_log /var/log/nginx/saacb-error.log;

    # Client max body size (para uploads)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # ==========================================
    # DJANGO (Porta 30010)
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:30010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # API DE CÁLCULOS (Porta 8002)
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (necessários se a API não tem CORS)
        add_header 'Access-Control-Allow-Origin' 'https://saacb.lakeserver.online' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Preflight request
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ==========================================
    # STATIC FILES (Django)
    # ==========================================
    location /static/ {
        alias /caminho/para/projeto-saacb/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # MEDIA FILES (Django)
    # ==========================================
    location /media/ {
        alias /caminho/para/projeto-saacb/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ==========================================
    # HEALTH CHECK
    # ==========================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# ==========================================
# NOTAS DE CONFIGURAÇÃO
# ==========================================
# 1. Copie este arquivo para /etc/nginx/sites-available/saacb
# 2. Ajuste os caminhos:
#    - ssl_certificate
#    - ssl_certificate_key
#    - alias do /static/
#    - alias do /media/
# 3. Crie symlink: ln -s /etc/nginx/sites-available/saacb /etc/nginx/sites-enabled/
# 4. Teste configuração: nginx -t
# 5. Recarregue Nginx: nginx -s reload
# 6. Verifique se está funcionando: systemctl status nginx
#
# ==========================================
# CERTIFICADO SSL (Let's Encrypt)
# ==========================================
# Certbot com Nginx:
#   sudo certbot --nginx -d saacb.lakeserver.online
#
# Renovar automaticamente:
#   sudo certbot renew --dry-run
#   sudo certbot renew
#
# Certificado já instalado em:
#   /etc/letsencrypt/live/saacb.lakeserver.online/fullchain.pem
#   /etc/letsencrypt/live/saacb.lakeserver.online/privkey.pem
#
# ==========================================
# TESTES
# ==========================================
# Testar HTTP → HTTPS redirect:
#   curl -I http://saacb.lakeserver.online/
#
# Testar HTTPS:
#   curl -I https://saacb.lakeserver.online/
#
# Testar health check:
#   curl https://saacb.lakeserver.online/health
#
# ==========================================
# MONITORAMENTO
# ==========================================
# Ver logs:
#   tail -f /var/log/nginx/saacb-access.log
#   tail -f /var/log/nginx/saacb-error.log
#
# Ver status:
#   systemctl status nginx
