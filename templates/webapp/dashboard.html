170,"LUCIA APARECIDA S DE JESUS",087.038.696-44,1001145248,,,,"ANALISE cobranca",1,,7028546366,,,,,,,,,,,,"",,"","Trata-se de procedimento de cobrança administrativa instaurado em decorrência da Ação de Apuração de Irregularidade nº 496185228, que concluiu pela irregularidade na concessão e manutenção de benefício assistencial.

O benefício encontrava-se em nome de LUCIA APARECIDA S. DE JESUS, CPF nº 087.038.696-44, NB nº 87/702.854.636-6, referente ao Benefício de Prestação Continuada à Pessoa com Deficiência (BPC/LOAS), com Data de Início do Benefício (DIB) em 13/10/2016, tendo sido cessado em 18/03/2022, sob o motivo 42 – Cessado por Sistema de Óbitos (SISOBI).

Em consulta aos sistemas corporativos do INSS, especialmente ao Sistema Nacional de Informações de Registro Civil (SIRC), foi confirmado o óbito da titular do benefício. Ademais, após pesquisas nos sistemas disponíveis, não foram localizados registros de abertura de inventário, tampouco indícios da existência de espólio ou bens passíveis de responsabilização patrimonial.

Nos termos do artigo 1.997 do Código Civil, bem como em consonância com as normas internas que regem os procedimentos de cobrança administrativa no âmbito do INSS, a responsabilidade por eventuais valores indevidamente recebidos limita-se ao patrimônio deixado pelo falecido, não havendo transmissão automática da obrigação aos herdeiros.

Diante da inexistência de espólio ou bens inventariáveis, resta impossibilitado o prosseguimento da cobrança administrativa, por ausência de sujeito passivo patrimonial.

Diante do exposto, há impossibilidade de continuidade da cobrança administrativa, em razão do falecimento da titular do benefício e da inexistência de espólio ou bens conhecidos será efetuado arquivamento do procedimento de cobrança, sem prejuízo de futura reabertura, caso sejam identificados bens ou instaurado processo de inventário.",,,,PENDENTE,"COBRANÇA PROVENIENTE DE PROCESSO DE APURAÇÃO.  BOA FÉ!",,10,2,,,,,,,,"2026-03-16 16:22:22.886645",

""Considerando que a autora confirmou, em audiência, que afirmou estar separada de fato, no processo administrativo de concessão do benefício da LOAS, para conseguir o benefício assistencial, resta demonstrada a sua má-fé. Assim, autorizo o INSS a instaurar processo administrativo para reaver os valores pagos do benefício assistencial, bem como determino a expedição de ofício ao Ministério Público Federal, com cópia do processo administrativo do benefício assistencial (Id 989132715), do processo administrativo de pensão por morte (Id 897597120), da gravação da audiência e da sentença, para os fins previstos no art. 40 do Código de Processo Penal.""

// ─── Helper Functions ───
function parseValor(v) {
  if (!v || v === '' || v === undefined || v === null) return 0;
  let s = String(v).trim();
  s = s.replace(/^R\$\s*/, '');
  s = s.replace(/\./g, '');
  s = s.replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function formatCurrency(v) {
  if (v == null || isNaN(v)) return 'R$ 0,00';
  return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseDate(d) {
  if (!d || d === '') return null;
  const s = String(d).trim();
  const dt = new Date(s);
  return isNaN(dt.getTime()) ? null : dt;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt.getTime())) return '—';
  return dt.toLocaleDateString('pt-BR');
}

function getStatusLabel(s) {
  if (!s) return '—';
  if (s === 'PENDENTE') return 'Pendente';
  if (s === 'CONCLUIDA_INTERMEDIARIA') return 'Concl. Intermediária';
  if (s === 'CONCLUIDA_FINALIZADA') return 'Concl. Finalizada';
  return s;
}

function getStatusClass(s) {
  if (s === 'PENDENTE') return 'badge-pendente';
  if (s === 'CONCLUIDA_INTERMEDIARIA') return 'badge-intermediaria';
  if (s === 'CONCLUIDA_FINALIZADA') return 'badge-finalizada';
  return '';
}

    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="SAMC Logo">
      <rect x="2" y="2" width="36" height="36" rx="8" stroke="#3b82f6" strokeWidth="2" fill="none"/>
      <path d="M10 28 L10 18 L16 18 L16 22 L10 22" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      <path d="M18 28 L18 14 L22 14 L26 20 L26 14 L30 14 L30 28" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      <circle cx="20" cy="10" r="2" fill="#3b82f6"/>
    </svg>
  );
}

// ─── KPI Card ───
function KpiCard({ label, value, icon, color }) {
  return (
    <div className="card card-hover p-5 animate-fade-in">
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs font-semibold uppercase tracking-wider text-slate-400">{label}</span>
        <span className="text-2xl">{icon}</span>
      </div>
      <div className="kpi-value text-2xl font-bold" style={{ color: color || '#e2e8f0' }}>
        {value}
      </div>
    </div>
  );
}

// ─── Custom Tooltip ───
function CustomTooltip({ active, payload, label, formatter }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="card p-3 shadow-xl border-slate-600" style={{ minWidth: 160 }}>
      <p className="text-xs font-semibold text-slate-300 mb-2">{label}</p>
      {payload.map((p, i) => (
        <div key={i} className="flex items-center gap-2 text-xs mb-1">
          <span className="w-2 h-2 rounded-full" style={{ background: p.color }}></span>
          <span className="text-slate-400">{p.name}:</span>
          <span className="font-semibold text-slate-200">{formatter ? formatter(p.value) : p.value}</span>
        </div>
      ))}
    </div>
  );
}

// ─── User Detail Modal ───
function UserModal({ userId, data, onClose }) {
  if (!userId) return null;
  const userTasks = data.filter(r => String(r.nome_tarefa_id || r.assigned_user_id) === String(userId));
  const total = userTasks.length;
  const completed = userTasks.filter(r => r.status === 'CONCLUIDA_INTERMEDIARIA' || r.status === 'CONCLUIDA_FINALIZADA').length;
  const rate = total > 0 ? ((completed / total) * 100).toFixed(1) : 0;
  const totalValor = userTasks.reduce((s, r) => s + parseValor(r.valor), 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content animate-fade-in" onClick={e => e.stopPropagation()}>
        <div className="p-6 border-b border-slate-700 flex items-center justify-between">
          <div>
            <h2 className="text-xl font-bold">Usuário {userId}</h2>
            <p className="text-sm text-slate-400 mt-1">Detalhes de produtividade</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none p-2">&times;</button>
        </div>
        <div className="p-6">
          <div className="grid grid-cols-3 gap-4 mb-6">
            <div className="card p-4 text-center">
              <div className="text-2xl font-bold text-blue-400 kpi-value">{total}</div>
              <div className="text-xs text-slate-400 mt-1">Total Tarefas</div>
            </div>
            <div className="card p-4 text-center">
              <div className="text-2xl font-bold text-green-400 kpi-value">{rate}%</div>
              <div className="text-xs text-slate-400 mt-1">Taxa Conclusão</div>
            </div>
            <div className="card p-4 text-center">
              <div className="text-lg font-bold text-amber-400 kpi-value">{formatCurrency(totalValor)}</div>
              <div className="text-xs text-slate-400 mt-1">Valor Total</div>
            </div>
          </div>
          <div className="overflow-x-auto" style={{ maxHeight: 400 }}>
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>Interessado</th><th>Status</th><th>Serviço</th><th>Valor</th><th>Atualizado</th>
                </tr>
              </thead>
              <tbody>
                {userTasks.map((r, i) => (
                  <tr key={i}>
                    <td className="font-mono text-xs">{r.id}</td>
                    <td className="max-w-[200px] truncate">{r.nome_interessado}</td>
                    <td><span className={`badge ${getStatusClass(r.status)}`}>{getStatusLabel(r.status)}</span></td>
                    <td className="text-xs">{r.servico}</td>
                    <td className="kpi-value text-xs">{r.valor ? formatCurrency(parseValor(r.valor)) : '—'}</td>
                    <td className="text-xs">{formatDate(r.atualizado_em)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [rawData, setRawData] = useState([]);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [dragActive, setDragActive] = useState(false);

  // Filters
  const [filterUsers, setFilterUsers] = useState([]);
  const [filterStatus, setFilterStatus] = useState([]);
  const [filterServico, setFilterServico] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [searchText, setSearchText] = useState('');

  // Table
  const [sortCol, setSortCol] = useState('id');
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage] = useState(1);
  const pageSize = 10;

  // Modal
  const [selectedUser, setSelectedUser] = useState(null);

  const fileInputRef = useRef(null);

  // Parse CSV
  const parseCSV = useCallback((csvText) => {
    const result = Papa.parse(csvText, { header: true, skipEmptyLines: true, dynamicTyping: false });
    const rows = result.data.filter(r => r.id && r.id.trim() !== '');
    setRawData(rows);
    setLastUpdated(new Date());
    setPage(1);
  }, []);

  // Load default data
  useEffect(() => {
    parseCSV(DEFAULT_CSV);
  }, [parseCSV]);

  // File upload
  const handleFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  };

  // Unique values
  const allUsers = useMemo(() => {
    const s = new Set(rawData.map(r => r.nome_tarefa_id || r.assigned_user_id).filter(Boolean));
    return Array.from(s).sort((a, b) => Number(a) - Number(b));
  }, [rawData]);

  const allStatuses = useMemo(() => {
    const s = new Set(rawData.map(r => r.status).filter(Boolean));
    return Array.from(s);
  }, [rawData]);

  const allServicos = useMemo(() => {
    const s = new Set(rawData.map(r => r.servico).filter(Boolean));
    return Array.from(s).sort();
  }, [rawData]);

  // Filtered data
  const filteredData = useMemo(() => {
    let d = rawData;
    if (filterUsers.length > 0) {
      d = d.filter(r => filterUsers.includes(String(r.nome_tarefa_id || r.assigned_user_id)));
    }
    if (filterStatus.length > 0) {
      d = d.filter(r => filterStatus.includes(r.status));
    }
    if (filterServico) {
      d = d.filter(r => r.servico === filterServico);
    }
    if (dateFrom) {
      const from = new Date(dateFrom);
      d = d.filter(r => { const dt = parseDate(r.atualizado_em); return dt && dt >= from; });
    }
    if (dateTo) {
      const to = new Date(dateTo + 'T23:59:59');
      d = d.filter(r => { const dt = parseDate(r.atualizado_em); return dt && dt <= to; });
    }
    if (searchText.trim()) {
      const q = searchText.trim().toLowerCase();
      d = d.filter(r => r.nome_interessado && r.nome_interessado.toLowerCase().includes(q));
    }
    return d;
  }, [rawData, filterUsers, filterStatus, filterServico, dateFrom, dateTo, searchText]);

  // KPIs
  const totalTarefas = filteredData.length;
  const pendentes = filteredData.filter(r => r.status === 'PENDENTE').length;
  const concluidas = filteredData.filter(r => r.status === 'CONCLUIDA_INTERMEDIARIA' || r.status === 'CONCLUIDA_FINALIZADA').length;
  const totalValor = filteredData.reduce((s, r) => s + parseValor(r.valor), 0);

  // Chart A - Tarefas por Usuário
  const chartAData = useMemo(() => {
    const map = {};
    filteredData.forEach(r => {
      const u = r.nome_tarefa_id || r.assigned_user_id || '?';
      if (!map[u]) map[u] = { user: `Usuário ${u}`, userId: u, PENDENTE: 0, CONCLUIDA_INTERMEDIARIA: 0, CONCLUIDA_FINALIZADA: 0 };
      if (map[u][r.status] !== undefined) map[u][r.status]++;
    });
    return Object.values(map).sort((a, b) => Number(a.userId) - Number(b.userId));
  }, [filteredData]);

  // Chart B - Status distribution
  const chartBData = useMemo(() => {
    const map = {};
    filteredData.forEach(r => {
      const s = r.status || 'DESCONHECIDO';
      map[s] = (map[s] || 0) + 1;
    });
    return Object.entries(map).map(([name, value]) => ({ name: getStatusLabel(name), value, key: name }));
  }, [filteredData]);

  // Chart C - Tarefas por Serviço
  const chartCData = useMemo(() => {
    const map = {};
    filteredData.forEach(r => {
      const s = r.servico || 'Sem serviço';
      map[s] = (map[s] || 0) + 1;
    });
    return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filteredData]);

  // Chart D - Evolução Temporal (por semana)
  const chartDData = useMemo(() => {
    const map = {};
    filteredData.forEach(r => {
      const dt = parseDate(r.atualizado_em);
      if (!dt) return;
      // Group by week - get Monday of the week
      const d = new Date(dt);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      const key = monday.toISOString().slice(0, 10);
      map[key] = (map[key] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([date, count]) => ({
      date: new Date(date).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
      fullDate: date,
      tarefas: count
    }));
  }, [filteredData]);

  // Chart E - Valores por Usuário
  const chartEData = useMemo(() => {
    const map = {};
    filteredData.forEach(r => {
      const u = r.nome_tarefa_id || r.assigned_user_id || '?';
      map[u] = (map[u] || 0) + parseValor(r.valor);
    });
    return Object.entries(map).map(([u, v]) => ({ user: `Usuário ${u}`, userId: u, valor: v })).sort((a, b) => Number(a.userId) - Number(b.userId));
  }, [filteredData]);

  // Table sorting
  const sortedData = useMemo(() => {
    const arr = [...filteredData];
    arr.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortCol === 'id' || sortCol === 'assigned_user_id') {
        va = Number(va) || 0; vb = Number(vb) || 0;
      } else if (sortCol === 'valor') {
        va = parseValor(va); vb = parseValor(vb);
      } else if (sortCol === 'atualizado_em') {
        va = parseDate(va) || new Date(0); vb = parseDate(vb) || new Date(0);
      } else {
        va = String(va || '').toLowerCase(); vb = String(vb || '').toLowerCase();
      }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return arr;
  }, [filteredData, sortCol, sortDir]);

  const totalPages = Math.ceil(sortedData.length / pageSize);
  const pageData = sortedData.slice((page - 1) * pageSize, page * pageSize);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
    setPage(1);
  };

  const clearFilters = () => {
    setFilterUsers([]);
    setFilterStatus([]);
    setFilterServico('');
    setDateFrom('');
    setDateTo('');
    setSearchText('');
    setPage(1);
  };

  const toggleUser = (u) => {
    setFilterUsers(prev => prev.includes(u) ? prev.filter(x => x !== u) : [...prev, u]);
    setPage(1);
  };

  const toggleStatus = (s) => {
    setFilterStatus(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);
    setPage(1);
  };

  const handleBarClick = (data) => {
    if (data && data.activePayload && data.activePayload[0]) {
      const userId = data.activePayload[0].payload.userId;
      setSelectedUser(userId);
    }
  };

  const sortArrow = (col) => {
    if (sortCol !== col) return <span className="text-slate-600 ml-1">↕</span>;
    return <span className="text-blue-400 ml-1">{sortDir === 'asc' ? '↑' : '↓'}</span>;
  };

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-slate-700 bg-[#1e293b]/80 backdrop-blur-sm sticky top-0 z-40">
        <div className="max-w-[1600px] mx-auto px-6 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <SamcLogo />
            <div>
              <h1 className="text-lg font-bold tracking-tight">Dashboard SAMC</h1>
              <p className="text-xs text-slate-400">Sistema de Produtividade</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {lastUpdated && (
              <span className="text-xs text-slate-500">
                Atualizado: {lastUpdated.toLocaleString('pt-BR')}
              </span>
            )}
            <button
              onClick={() => fileInputRef.current?.click()}
              className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2"
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 5l4-4 4 4M2 12v2h12v-2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Upload CSV
            </button>
            <input ref={fileInputRef} type="file" accept=".csv" className="hidden" onChange={e => handleFile(e.target.files[0])} />
          </div>
        </div>
      </header>

      <main className="max-w-[1600px] mx-auto px-6 py-6">
        {/* Drop Zone */}
        <div
          className={`drop-zone mb-6 p-4 text-center text-sm text-slate-500 cursor-pointer ${dragActive ? 'active' : ''}`}
          onDragEnter={(e) => { e.preventDefault(); setDragActive(true); }}
          onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
          onDragLeave={() => setDragActive(false)}
          onDrop={(e) => { e.preventDefault(); setDragActive(false); handleFile(e.dataTransfer.files[0]); }}
          onClick={() => fileInputRef.current?.click()}
        >
          <svg className="mx-auto mb-2" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="1.5"><path d="M12 5v14M5 12h14" strokeLinecap="round"/></svg>
          Arraste um arquivo CSV ou clique para fazer upload
        </div>

        {/* Filters */}
        <div className="card p-4 mb-6 animate-fade-in">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1 2h14l-5 6v5l-4 2V8L1 2z"/></svg>
              Filtros
            </h3>
            <button onClick={clearFilters} className="text-xs text-blue-400 hover:text-blue-300 font-medium">Limpar Filtros</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
            {/* User filter */}
            <div>
              <label className="text-xs text-slate-400 mb-1 block">Usuário</label>
              <div className="flex flex-wrap gap-2">
                {allUsers.map(u => (
                  <label key={u} className="flex items-center gap-1 cursor-pointer text-xs">
                    <input type="checkbox" className="checkbox-custom" checked={filterUsers.includes(String(u))} onChange={() => toggleUser(String(u))} />
                    <span className="text-slate-300">Usr {u}</span>
                  </label>
                ))}
              </div>
            </div>
            {/* Status filter */}
            <div>
              <label className="text-xs text-slate-400 mb-1 block">Status</label>
              <div className="flex flex-col gap-1">
                {allStatuses.map(s => (
                  <label key={s} className="flex items-center gap-2 cursor-pointer text-xs">
                    <input type="checkbox" className="checkbox-custom" checked={filterStatus.includes(s)} onChange={() => toggleStatus(s)} />
                    <span className={`badge ${getStatusClass(s)}`}>{getStatusLabel(s)}</span>
                  </label>
                ))}
              </div>
            </div>
            {/* Serviço filter */}
            <div>
              <label className="text-xs text-slate-400 mb-1 block">Serviço</label>
              <select className="filter-select w-full" value={filterServico} onChange={e => { setFilterServico(e.target.value); setPage(1); }}>
                <option value="">Todos</option>
                {allServicos.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            {/* Date range */}
            <div>
              <label className="text-xs text-slate-400 mb-1 block">Data Início</label>
              <input type="date" className="filter-select w-full" value={dateFrom} onChange={e => { setDateFrom(e.target.value); setPage(1); }} />
            </div>
            <div>
              <label className="text-xs text-slate-400 mb-1 block">Data Fim</label>
              <input type="date" className="filter-select w-full" value={dateTo} onChange={e => { setDateTo(e.target.value); setPage(1); }} />
            </div>
          </div>
        </div>

        {/* KPI Cards */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <KpiCard label="Total de Tarefas" value={totalTarefas} icon="📋" color="#e2e8f0" />
          <KpiCard label="Pendentes" value={pendentes} icon="⏳" color="#f59e0b" />
          <KpiCard label="Concluídas" value={concluidas} icon="✅" color="#10b981" />
          <KpiCard label="Total de Valores" value={formatCurrency(totalValor)} icon="💰" color="#3b82f6" />
        </div>

        {/* Charts Row 1 */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          {/* Chart A - Tarefas por Usuário */}
          <div className="card p-5 animate-fade-in">
            <h3 className="text-sm font-semibold text-slate-300 mb-4">Tarefas por Usuário</h3>
            <p className="text-xs text-slate-500 mb-3">Clique em uma barra para ver detalhes do usuário</p>
            <ResponsiveContainer width="100%" height={320}>
              <BarChart data={chartAData} onClick={handleBarClick} style={{ cursor: 'pointer' }} margin={{ bottom: 10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                <XAxis dataKey="user" tick={{ fontSize: 11, fill: '#94a3b8' }} />
                <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} allowDecimals={false} />
                <Tooltip content={<CustomTooltip />} />
                <Legend verticalAlign="bottom" height={36} wrapperStyle={{ paddingTop: 10 }} />
                <Bar dataKey="PENDENTE" name="Pendente" fill="#f59e0b" radius={[2, 2, 0, 0]} />
                <Bar dataKey="CONCLUIDA_INTERMEDIARIA" name="Concl. Intermediária" fill="#3b82f6" radius={[2, 2, 0, 0]} />
                <Bar dataKey="CONCLUIDA_FINALIZADA" name="Concl. Finalizada" fill="#10b981" radius={[2, 2, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Chart B - Status das Tarefas */}
          <div className="card p-5 animate-fade-in">
            <h3 className="text-sm font-semibold text-slate-300 mb-4">Status das Tarefas</h3>
            <ResponsiveContainer width="100%" height={320}>
              <PieChart>
                <Pie
                  data={chartBData}
                  cx="50%"
                  cy="42%"
                  innerRadius={50}
                  outerRadius={90}
                  paddingAngle={3}
                  dataKey="value"
                  label={({ name, percent, cx, cy, midAngle, outerRadius }) => {
                    const RADIAN = Math.PI / 180;
                    const radius = outerRadius + 25;
                    const x = cx + radius * Math.cos(-midAngle * RADIAN);
                    const y = cy + radius * Math.sin(-midAngle * RADIAN);
                    return React.createElement('text', {
                      x, y, fill: '#94a3b8', fontSize: 11, textAnchor: x > cx ? 'start' : 'end', dominantBaseline: 'central'
                    }, `${name} (${(percent * 100).toFixed(0)}%)`);
                  }}
                  labelLine={{ stroke: '#475569', strokeWidth: 1 }}
                >
                  {chartBData.map((entry, i) => (
                    <Cell key={i} fill={STATUS_COLORS[entry.key] || '#64748b'} />
                  ))}
                </Pie>
                <Tooltip
                  content={({ active, payload }) => {
                    if (!active || !payload || !payload.length) return null;
                    const d = payload[0];
                    return (
                      <div className="card p-3 shadow-xl border-slate-600">
                        <p className="text-xs font-semibold text-slate-300">{d.name}</p>
                        <p className="text-sm font-bold" style={{ color: d.payload.fill }}>{d.value} tarefas ({((d.value / totalTarefas) * 100).toFixed(1)}%)</p>
                      </div>
                    );
                  }}
                />
                <Legend
                  verticalAlign="bottom"
                  height={36}
                  formatter={(value) => <span style={{ color: '#94a3b8', fontSize: 12 }}>{value}</span>}
                />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Charts Row 2 */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          {/* Chart C - Tarefas por Serviço */}
          <div className="card p-5 animate-fade-in">
            <h3 className="text-sm font-semibold text-slate-300 mb-4">Tarefas por Serviço</h3>
            <ResponsiveContainer width="100%" height={Math.max(200, chartCData.length * 50)}>
              <BarChart data={chartCData} layout="vertical" margin={{ left: 20 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                <XAxis type="number" tick={{ fontSize: 11, fill: '#94a3b8' }} allowDecimals={false} />
                <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fill: '#94a3b8' }} width={150} />
                <Tooltip content={<CustomTooltip />} />
                <Bar dataKey="value" name="Tarefas" fill="#6366f1" radius={[0, 4, 4, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Chart D - Evolução Temporal */}
          <div className="card p-5 animate-fade-in">
            <h3 className="text-sm font-semibold text-slate-300 mb-4">Evolução Temporal</h3>
            <p className="text-xs text-slate-500 mb-3">Tarefas atualizadas por semana</p>
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={chartDData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                <XAxis dataKey="date" tick={{ fontSize: 10, fill: '#94a3b8' }} />
                <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} allowDecimals={false} />
                <Tooltip content={<CustomTooltip />} />
                <Line type="monotone" dataKey="tarefas" name="Tarefas" stroke="#3b82f6" strokeWidth={2} dot={{ fill: '#3b82f6', r: 4 }} activeDot={{ r: 6, fill: '#60a5fa' }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Chart E - Valores por Usuário */}
        <div className="card p-5 mb-6 animate-fade-in">
          <h3 className="text-sm font-semibold text-slate-300 mb-4">Valores por Usuário</h3>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={chartEData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="user" tick={{ fontSize: 11, fill: '#94a3b8' }} />
              <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} tickFormatter={v => `R$ ${(v/1000).toFixed(0)}k`} />
              <Tooltip content={<CustomTooltip formatter={v => formatCurrency(v)} />} />
              <Bar dataKey="valor" name="Valor Total" fill="#10b981" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Task Table */}
        <div className="card p-5 animate-fade-in">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
            <h3 className="text-sm font-semibold text-slate-300">Tabela de Tarefas</h3>
            <div className="flex items-center gap-3">
              <input
                type="text"
                placeholder="Buscar por nome do interessado..."
                className="search-input"
                style={{ width: 280 }}
                value={searchText}
                onChange={e => { setSearchText(e.target.value); setPage(1); }}
              />
              <span className="text-xs text-slate-500">{sortedData.length} resultado(s)</span>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table>
              <thead>
                <tr>
                  <th onClick={() => handleSort('id')}>ID {sortArrow('id')}</th>
                  <th onClick={() => handleSort('nome_interessado')}>Nome Interessado {sortArrow('nome_interessado')}</th>
                  <th onClick={() => handleSort('servico')}>Serviço {sortArrow('servico')}</th>
                  <th onClick={() => handleSort('status')}>Status {sortArrow('status')}</th>
                  <th onClick={() => handleSort('nome_tarefa_id')}>Usuário {sortArrow('nome_tarefa_id')}</th>
                  <th onClick={() => handleSort('aps')}>APS {sortArrow('aps')}</th>
                  <th onClick={() => handleSort('valor')}>Valor {sortArrow('valor')}</th>
                  <th onClick={() => handleSort('atualizado_em')}>Atualizado Em {sortArrow('atualizado_em')}</th>
                </tr>
              </thead>
              <tbody>
                {pageData.map((r, i) => (
                  <tr key={i}>
                    <td className="font-mono text-xs text-slate-400">{r.id}</td>
                    <td className="max-w-[200px] truncate font-medium">{r.nome_interessado}</td>
                    <td className="text-xs text-slate-400">{r.servico}</td>
                    <td><span className={`badge ${getStatusClass(r.status)}`}>{getStatusLabel(r.status)}</span></td>
                    <td className="text-sm">Usr {r.nome_tarefa_id || r.assigned_user_id}</td>
                    <td className="text-xs text-slate-400 max-w-[150px] truncate">{r.aps || '—'}</td>
                    <td className="kpi-value text-xs">{r.valor ? formatCurrency(parseValor(r.valor)) : '—'}</td>
                    <td className="text-xs text-slate-400">{formatDate(r.atualizado_em)}</td>
                  </tr>
                ))}
                {pageData.length === 0 && (
                  <tr><td colSpan={8} className="text-center py-8 text-slate-500">Nenhuma tarefa encontrada</td></tr>
                )}
              </tbody>
            </table>
          </div>
          {/* Pagination */}
          {totalPages > 1 && (
            <div className="flex items-center justify-between mt-4 pt-4 border-t border-slate-700">
              <span className="text-xs text-slate-500">
                Página {page} de {totalPages} ({sortedData.length} tarefas)
              </span>
              <div className="flex items-center gap-2">
                <button
                  disabled={page <= 1}
                  onClick={() => setPage(1)}
                  className="px-3 py-1.5 text-xs rounded-md bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                >
                  ««
                </button>
                <button
                  disabled={page <= 1}
                  onClick={() => setPage(p => p - 1)}
                  className="px-3 py-1.5 text-xs rounded-md bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                >
                  ‹ Anterior
                </button>
                {Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
                  let p;
                  if (totalPages <= 5) p = i + 1;
                  else if (page <= 3) p = i + 1;
                  else if (page >= totalPages - 2) p = totalPages - 4 + i;
                  else p = page - 2 + i;
                  return (
                    <button
                      key={p}
                      onClick={() => setPage(p)}
                      className={`w-8 h-8 text-xs rounded-md transition-colors ${page === p ? 'bg-blue-600 text-white' : 'bg-slate-700 hover:bg-slate-600'}`}
                    >
                      {p}
                    </button>
                  );
                })}
                <button
                  disabled={page >= totalPages}
                  onClick={() => setPage(p => p + 1)}
                  className="px-3 py-1.5 text-xs rounded-md bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                >
                  Próxima ›
                </button>
                <button
                  disabled={page >= totalPages}
                  onClick={() => setPage(totalPages)}
                  className="px-3 py-1.5 text-xs rounded-md bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                >
                  »»
                </button>
              </div>
            </div>
          )}
        </div>
      </main>

      {/* Footer */}
      <footer className="border-t border-slate-800 mt-8 py-4 text-center">
        <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" className="text-xs text-slate-600 hover:text-slate-400 transition-colors">
          Created with Perplexity Computer
        </a>
      </footer>

      {/* User Detail Modal */}
      {selectedUser && <UserModal userId={selectedUser} data={filteredData} onClose={() => setSelectedUser(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
