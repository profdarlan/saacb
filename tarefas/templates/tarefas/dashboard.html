{% extends "base.html" %}
{% load static %}

{% block title %}Dashboard SAMC - Produtividade{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
  .card-hover { transition: all 0.2s ease; }
  .card-hover:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.1); }
  .badge { padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-pendente { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-intermediaria { background: rgba(59,130,246,0.15); color: #3b82f6; }
  .badge-finalizada { background: rgba(16,185,129,0.15); color: #10b981; }
  .filter-select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; }
  .filter-select:focus { border-color: #3b82f6; }
  .filter-select option { background: #1e293b; }
  .search-input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; width: 100%; }
  .search-input:focus { border-color: #3b82f6; }
  .search-input::placeholder { color: #64748b; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  th { background: #0f172a; position: sticky; top: 0; z-index: 2; padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; cursor: pointer; user-select: none; border-bottom: 1px solid #334155; }
  td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.5); }
  tr:hover td { background: rgba(59,130,246,0.03); }
  .kpi-value { font-variant-numeric: tabular-nums lining-nums; }
  .animate-fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .recharts-cartesian-axis-tick-value { fill: #94a3b8 !important; font-size: 11px !important; }
  .recharts-legend-item-text { color: #94a3b8 !important; font-size: 12px !important; }
</style>
{% endblock %}

{% block content %}
<div id="root"
     data-user="{{ request.user.username }}"
     data-api-url="{% url 'dashboard_data' %}">
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

<script type="text/babel">
{% verbatim %}
const { useState, useEffect, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        PieChart, Pie, Cell, ResponsiveContainer } = Recharts;

const rootEl   = document.getElementById('root');
const CURRENT_USER = rootEl.dataset.user;
const API_URL      = rootEl.dataset.apiUrl;

const STATUS_COLORS = {
  PENDENTE:                '#f59e0b',
  CONCLUIDA_INTERMEDIARIA: '#3b82f6',
  CONCLUIDA_FINALIZADA:    '#10b981',
};

function BadgeStatus({ status }) {
  const map = {
    PENDENTE:                { label: 'Pendente',      cls: 'badge-pendente' },
    CONCLUIDA_INTERMEDIARIA: { label: 'Intermediária', cls: 'badge-intermediaria' },
    CONCLUIDA_FINALIZADA:    { label: 'Finalizada',    cls: 'badge-finalizada' },
  };
  const { label, cls } = map[status] || { label: status, cls: '' };
  return <span className={`badge ${cls}`}>{label}</span>;
}

function KPICard({ label, value, color }) {
  return (
    <div className="card card-hover p-5 animate-fade-in" style={{ padding: 20 }}>
      <p style={{ color: '#94a3b8', fontSize: 12, marginBottom: 6, textTransform: 'uppercase' }}>{label}</p>
      <p className="kpi-value" style={{ fontSize: 32, fontWeight: 800, color }}>{value}</p>
    </div>
  );
}

function DashboardApp() {
  const [tarefas,  setTarefas]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [error,    setError]    = useState(null);
  const [filter,   setFilter]   = useState('TODOS');
  const [search,   setSearch]   = useState('');
  const [sortKey,  setSortKey]  = useState('atualizado_em');
  const [sortAsc,  setSortAsc]  = useState(false);

  // ✅ useEffect único e correto — sem código duplicado
  useEffect(() => {
    fetch(API_URL, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(json => {
        setTarefas(json.tarefas || []);
        setLoading(false);
      })
      .catch(e => {
        setError(e.message);
        setLoading(false);
      });
  }, []);

  const kpis = useMemo(() => ({
    total:         tarefas.length,
    pendentes:     tarefas.filter(t => t.status === 'PENDENTE').length,
    intermediarias:tarefas.filter(t => t.status === 'CONCLUIDA_INTERMEDIARIA').length,
    finalizadas:   tarefas.filter(t => t.status === 'CONCLUIDA_FINALIZADA').length,
  }), [tarefas]);

  const pieData = useMemo(() => [
    { name: 'Pendentes',      value: kpis.pendentes,      color: STATUS_COLORS.PENDENTE },
    { name: 'Intermediárias', value: kpis.intermediarias, color: STATUS_COLORS.CONCLUIDA_INTERMEDIARIA },
    { name: 'Finalizadas',    value: kpis.finalizadas,    color: STATUS_COLORS.CONCLUIDA_FINALIZADA },
  ].filter(d => d.value > 0), [kpis]);

  const tarefasFiltradas = useMemo(() => {
    let list = tarefas;
    if (filter !== 'TODOS') list = list.filter(t => t.status === filter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(t =>
        (t.nome_interessado || '').toLowerCase().includes(q) ||
        (t.tarefa_n         || '').toLowerCase().includes(q) ||
        (t.servico          || '').toLowerCase().includes(q)
      );
    }
    return [...list].sort((a, b) => {
      const va = String(a[sortKey] ?? '');
      const vb = String(b[sortKey] ?? '');
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }, [tarefas, filter, search, sortKey, sortAsc]);

  function handleSort(key) {
    if (sortKey === key) setSortAsc(v => !v);
    else { setSortKey(key); setSortAsc(true); }
  }

  if (loading) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'60vh' }}>
      <p className="pulse" style={{ color:'#3b82f6', fontSize:18 }}>Carregando dados...</p>
    </div>
  );

  if (error) return (
    <div style={{ padding:40, textAlign:'center', color:'#f87171' }}>
      <p style={{ fontSize:18 }}>Erro ao carregar dados</p>
      <p style={{ color:'#94a3b8', fontSize:14, marginTop:8 }}>{error}</p>
    </div>
  );

  return (
    <div style={{ padding:24, maxWidth:1400, margin:'0 auto' }}>

      {/* Header */}
      <div style={{ marginBottom:28 }}>
        <h1 style={{ fontSize:24, fontWeight:800, color:'#f1f5f9' }}>Dashboard SAMC</h1>
        <p style={{ color:'#64748b', fontSize:13, marginTop:4 }}>
          Olá, <strong style={{ color:'#94a3b8' }}>{CURRENT_USER}</strong> — {tarefas.length} tarefas
        </p>
      </div>

      {/* KPIs */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:16, marginBottom:28 }}>
        <KPICard label="Total"          value={kpis.total}          color="#e2e8f0" />
        <KPICard label="Pendentes"      value={kpis.pendentes}      color="#f59e0b" />
        <KPICard label="Intermediárias" value={kpis.intermediarias} color="#3b82f6" />
        <KPICard label="Finalizadas"    value={kpis.finalizadas}    color="#10b981" />
      </div>

      {/* Gráfico */}
      {pieData.length > 0 && (
        <div className="card" style={{ padding:20, marginBottom:28 }}>
          <p style={{ fontWeight:600, marginBottom:16, color:'#f1f5f9' }}>Distribuição por Status</p>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80}
                   label={({ name, percent }) => `${name} ${(percent*100).toFixed(0)}%`}>
                {pieData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
              </Pie>
              <Tooltip contentStyle={{ background:'#1e293b', border:'1px solid #334155', borderRadius:8 }} />
              <Legend />
            </PieChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Filtros */}
      <div style={{ display:'flex', gap:12, marginBottom:16, flexWrap:'wrap' }}>
        <input className="search-input" style={{ maxWidth:280 }}
          placeholder="Buscar por nome, tarefa, serviço..."
          value={search} onChange={e => setSearch(e.target.value)} />
        <select className="filter-select" value={filter} onChange={e => setFilter(e.target.value)}>
          <option value="TODOS">Todos os status</option>
          <option value="PENDENTE">Pendentes</option>
          <option value="CONCLUIDA_INTERMEDIARIA">Intermediárias</option>
          <option value="CONCLUIDA_FINALIZADA">Finalizadas</option>
        </select>
        <span style={{ color:'#64748b', fontSize:13, alignSelf:'center' }}>
          {tarefasFiltradas.length} resultado(s)
        </span>
      </div>

      {/* Tabela */}
      <div className="card" style={{ overflow:'auto', maxHeight:480 }}>
        <table>
          <thead>
            <tr>
              {[['tarefa_n','Nº Tarefa'],['nome_interessado','Interessado'],
                ['servico','Serviço'],['status','Status'],['atualizado_em','Atualizado em']
              ].map(([key, label]) => (
                <th key={key} onClick={() => handleSort(key)}>
                  {label}
                  <span style={{ color: sortKey===key ? '#3b82f6' : undefined, opacity: sortKey===key ? 1 : 0.3 }}>
                    {sortKey===key ? (sortAsc ? ' ↑' : ' ↓') : ' ↕'}
                  </span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {tarefasFiltradas.length === 0
              ? <tr><td colSpan={5} style={{ textAlign:'center', color:'#475569', padding:32 }}>Nenhuma tarefa encontrada</td></tr>
              : tarefasFiltradas.map(t => (
                <tr key={t.id}>
                  <td style={{ color:'#94a3b8', fontFamily:'monospace' }}>{t.tarefa_n || '—'}</td>
                  <td style={{ color:'#f1f5f9', fontWeight:500 }}>{t.nome_interessado || '—'}</td>
                  <td style={{ color:'#94a3b8' }}>{t.servico || '—'}</td>
                  <td><BadgeStatus status={t.status} /></td>
                  <td style={{ color:'#64748b' }}>
                    {t.atualizado_em ? new Date(t.atualizado_em).toLocaleDateString('pt-BR') : '—'}
                  </td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DashboardApp />);
{% endverbatim %}
</script>
{% endblock %}
