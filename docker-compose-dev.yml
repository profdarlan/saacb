version: '3.8'

services:
  saacb-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saacb-django-dev
    command: gunicorn projeto_saacb.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class sync --timeout 120 --keep-alive 5 --log-level info
    ports:
      - "30010:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-saacb-dev
      - ALLOWED_HOSTS=localhost,127.0.0.1,192.168.1.51
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - SISGRU_USUARIO=
      - SISGRU_SENHA=
      - SISGRU_PRODUCAO=False
      - CALCULADORA_API_URL=http://planilha-calculos-dev:8000
      - CALCULADORA_API_TOKEN=
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3:8b
      - SECURE_SSL_REDIRECT=False
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./static:/app/static
    depends_on:
      - planilha-calculos-dev
    restart: unless-stopped
    networks:
      - saacb-dev-network

  planilha-calculos-dev:
    build:
      context: ../planilha_saacb
      dockerfile: Dockerfile
    container_name: planilha-calculos-dev
    ports:
      - "8003:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ../planilha_saacb:/app
      - planilha-dev-data:/app/data
    restart: unless-stopped
    networks:
      - saacb-dev-network

volumes:
  planilha-dev-data:

networks:
  saacb-dev-network:
    driver: bridge
