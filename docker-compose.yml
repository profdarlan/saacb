services:
  saacb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saacb-django
    command: gunicorn projeto_saacb.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class sync --timeout 120 --keep-alive 5 --log-level info
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-saacb-dev}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.1.51}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      - SISGRU_USUARIO=${SISGRU_USUARIO:-}
      - SISGRU_SENHA=${SISGRU_SENHA:-}
      - SISGRU_PRODUCAO=${SISGRU_PRODUCAO:-False}
      - CALCULADORA_API_URL=${CALCULADORA_API_URL:-http://planilha-calculos:8000}
      - CALCULADORA_API_TOKEN=${CALCULADORA_API_TOKEN:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - SECURE_SSL_REDIRECT=False
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./static:/app/static
    depends_on:
      - planilha-calculos
    restart: unless-stopped
    networks:
      - saacb-network

  planilha-calculos:
    build:
      context: ../planilha_saacb
      dockerfile: Dockerfile
    container_name: planilha-calculos
    ports:
      - "${CALCULADORA_PORT:-8002}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ../planilha_saacb:/app
      - planilha-data:/app/data
    restart: unless-stopped
    networks:
      - saacb-network

  postgres:
    image: postgres:15-alpine
    container_name: saacb-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-saacb}
      - POSTGRES_USER=${POSTGRES_USER:-saacb}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-saacb_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - saacb-network
    profiles:
      - production

volumes:
  planilha-data:
  postgres-data:

networks:
  saacb-network:
    driver: bridge
